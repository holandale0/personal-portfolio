  <line x1="39" y1="39" x2="55" y2="39" stroke="#00AA44" stroke-width="5" stroke-linecap="round" opacity="0.30"/>

  <line x1="36" y1="55" x2="47" y2="8"  stroke="#66FF99" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="47" y1="8"  x2="58" y2="55" stroke="#66FF99" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="39" y1="39" x2="55" y2="39" stroke="#66FF99" stroke-width="2.5" stroke-linecap="round"/>

