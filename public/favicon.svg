<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0e0e24"/>
      <stop offset="100%" stop-color="#04040f"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="11" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="5"  cy="5"  r="0.55" fill="white" opacity="0.65"/>
  <circle cx="21" cy="3"  r="0.40" fill="white" opacity="0.50"/>
  <circle cx="55" cy="7"  r="0.50" fill="white" opacity="0.60"/>
  <circle cx="61" cy="19" r="0.40" fill="white" opacity="0.40"/>
  <circle cx="3"  cy="38" r="0.45" fill="white" opacity="0.50"/>
  <circle cx="59" cy="52" r="0.50" fill="white" opacity="0.55"/>
  <circle cx="9"  cy="59" r="0.35" fill="white" opacity="0.40"/>
  <circle cx="32" cy="2"  r="0.35" fill="white" opacity="0.35"/>

  <!-- ═══════════════════════════════════════════
       L  —  sabre azul
  ════════════════════════════════════════════ -->

  <!-- glow externo (blur simulado por camadas) -->
  <polyline points="16,9 16,49 27,49"
    fill="none" stroke="#0055CC" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>
  <polyline points="16,9 16,49 27,49"
    fill="none" stroke="#0077FF" stroke-width="6"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.30"/>
  <!-- núcleo claro -->
  <polyline points="16,9 16,49 27,49"
    fill="none" stroke="#66CCFF" stroke-width="2.8"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- centro branco -->
  <polyline points="16,9 16,49 27,49"
    fill="none" stroke="white" stroke-width="1.0"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.90"/>

  <!-- emissão no início da lâmina (topo) -->
  <circle cx="16" cy="9" r="2.0" fill="#66CCFF" opacity="0.40"/>
  <!-- emissão na curva do L -->
  <circle cx="16" cy="49" r="1.8" fill="#44BBFF" opacity="0.50"/>

  <!-- Empunhadura do L -->
  <rect x="12.5" y="49" width="7" height="10" rx="2.2" fill="#3a3a3a" stroke="#6a6a6a" stroke-width="0.6"/>
  <rect x="12.5" y="51"  width="7" height="1.1" fill="#999" opacity="0.55"/>
  <rect x="12.5" y="53.5" width="7" height="1.1" fill="#999" opacity="0.55"/>
  <rect x="12.5" y="56"  width="7" height="1.1" fill="#999" opacity="0.55"/>
  <!-- botão final da empunhadura -->
  <ellipse cx="16" cy="59.5" rx="2.5" ry="1.2" fill="#555" stroke="#888" stroke-width="0.4"/>

  <!-- ═══════════════════════════════════════════
       A  —  sabre verde
  ════════════════════════════════════════════ -->

  <!-- glow externo -->
  <line x1="37" y1="49" x2="47" y2="9"  stroke="#005522" stroke-width="9" stroke-linecap="round" opacity="0.18"/>
  <line x1="47" y1="9"  x2="57" y2="49" stroke="#005522" stroke-width="9" stroke-linecap="round" opacity="0.18"/>
  <line x1="40" y1="37" x2="54" y2="37" stroke="#005522" stroke-width="7" stroke-linecap="round" opacity="0.18"/>

  <line x1="37" y1="49" x2="47" y2="9"  stroke="#00AA44" stroke-width="6" stroke-linecap="round" opacity="0.30"/>
  <line x1="47" y1="9"  x2="57" y2="49" stroke="#00AA44" stroke-width="6" stroke-linecap="round" opacity="0.30"/>
  <line x1="40" y1="37" x2="54" y2="37" stroke="#00AA44" stroke-width="5" stroke-linecap="round" opacity="0.30"/>

  <!-- núcleo claro -->
  <line x1="37" y1="49" x2="47" y2="9"  stroke="#66FF99" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="47" y1="9"  x2="57" y2="49" stroke="#66FF99" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="40" y1="37" x2="54" y2="37" stroke="#66FF99" stroke-width="2.5" stroke-linecap="round"/>
  <!-- centro branco -->
  <line x1="37" y1="49" x2="47" y2="9"  stroke="white" stroke-width="1.0" stroke-linecap="round" opacity="0.88"/>
  <line x1="47" y1="9"  x2="57" y2="49" stroke="white" stroke-width="1.0" stroke-linecap="round" opacity="0.88"/>
  <line x1="40.5" y1="37" x2="53.5" y2="37" stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.88"/>

  <!-- emissão no ápice do A -->
  <circle cx="47" cy="9"  r="2.0" fill="#66FF99" opacity="0.40"/>
  <!-- emissão nas bases -->
  <circle cx="37" cy="49" r="1.8" fill="#44EE88" opacity="0.50"/>
  <circle cx="57" cy="49" r="1.8" fill="#44EE88" opacity="0.50"/>

  <!-- Empunhadura esquerda do A -->
  <rect x="33.5" y="49" width="7" height="10" rx="2.2" fill="#3a3a3a" stroke="#6a6a6a" stroke-width="0.6"/>
  <rect x="33.5" y="51"   width="7" height="1.1" fill="#999" opacity="0.55"/>
  <rect x="33.5" y="53.5" width="7" height="1.1" fill="#999" opacity="0.55"/>
  <rect x="33.5" y="56"   width="7" height="1.1" fill="#999" opacity="0.55"/>
  <ellipse cx="37" cy="59.5" rx="2.5" ry="1.2" fill="#555" stroke="#888" stroke-width="0.4"/>

  <!-- Empunhadura direita do A -->
  <rect x="53.5" y="49" width="7" height="10" rx="2.2" fill="#3a3a3a" stroke="#6a6a6a" stroke-width="0.6"/>
  <rect x="53.5" y="51"   width="7" height="1.1" fill="#999" opacity="0.55"/>
  <rect x="53.5" y="53.5" width="7" height="1.1" fill="#999" opacity="0.55"/>
  <rect x="53.5" y="56"   width="7" height="1.1" fill="#999" opacity="0.55"/>
  <ellipse cx="57" cy="59.5" rx="2.5" ry="1.2" fill="#555" stroke="#888" stroke-width="0.4"/>
</svg>
