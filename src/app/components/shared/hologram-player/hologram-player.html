<div class="hologram" [class.hologram--active]="active()">

  <div class="hologram__idle"
       role="button"
       tabindex="0"
       aria-label="Reproduzir apresentação em vídeo"
       (click)="activate()"
       (keydown.enter)="activate()"
       (keydown.space)="$event.preventDefault(); activate()">
    <picture>
      <source srcset="assets/fotos/hologram3.webp" type="image/webp">
      <img class="hologram__image"
           src="assets/fotos/hologram3.png"
           alt="Clique para assistir a apresentação"
           draggable="false" />
    </picture>
    <div class="hologram__play-overlay">
      <div class="hologram__play-btn" aria-hidden="true">&#9654;</div>
    </div>
  </div>

  <div class="hologram__player">
    <button class="hologram__close"
            aria-label="Fechar vídeo"
            (click)="close($event)">✕</button>
    @if (active()) {
      <iframe
        class="hologram__iframe"
        [src]="safeUrl()"
        title="Apresentação Pessoal"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
    }
  </div>

</div>
